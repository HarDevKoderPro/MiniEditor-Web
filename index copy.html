<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenida - Mini Editor Web</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Fondo Animado -->
  <canvas id="matrixCanvas"></canvas>

  <div class="welcome-container">
    <!-- Contenedor del Círculo Azul -->
    <div class="profile-frame">
      <img src="./portada.webp" alt="Workspace Computer">
    </div>

    <header>
      <h1>BIENVENIDO AL <br><span class="highlight">MINI EDITOR WEB</span></h1>
      <p class="author">By Ing. Harold David Valdés</p>
    </header>

    <nav class="options">
      <button class="card" id="btnAprender">
        <span class="icon">🎯</span>
        <h3>APRENDER</h3>
        <p>Realiza actividades guiadas paso a paso.</p>
      </button>

      <button class="card" id="btnGestionar">
        <span class="icon">⚙️</span>
        <h3>GESTIONAR</h3>
        <p>Carga nuevos temas y desafíos (Admin).</p>
      </button>
    </nav>
  </div>

  <script src="script.js"></script>
</body>

</html>
