<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Editor Web - Interactivo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="matrixCanvas"></canvas>

  <!-- BIENVENIDA -->
  <div id="welcomeScreen" class="screen">
    <div class="welcome-container">
      <div class="profile-frame">
        <img src="./portada.webp" alt="Workspace">
      </div>
      <header>
        <h1>BIENVENIDO AL <br><span class="highlight">MINI EDITOR WEB</span></h1>
        <p class="author">By Ing. Harold David Valdés</p>
      </header>
      <nav class="options">
        <button class="card" id="btnAprender">
          <span class="icon">🎯</span>
          <h3>APRENDER</h3>
          <p>Realiza actividades guiadas paso a paso.</p>
        </button>
        <button class="card" id="btnGestionar">
          <span class="icon">⚙️</span>
          <h3>GESTIONAR</h3>
          <p>Carga nuevos temas y desafíos (Admin).</p>
        </button>
      </nav>
    </div>
  </div>

  <!-- GESTIONAR -->
  <div id="gestionarScreen" class="screen hidden">
    <div class="admin-container">
      <div class="admin-box">

        <div class="admin-icon">👤⚙️</div>
        <h2>Acceso Restringido</h2>
        <p>Ingresa la palabra clave para acceder al panel de administración.</p>

        <label>PALABRA CLAVE</label>
        <div class="input-group">
          <input type="password" id="adminPassword">
          <span class="toggle-pass">👁</span>
        </div>

        <button id="btnAcceder">Acceder</button>

        <!-- BOTÓN HOME -->
        <button id="btnHomeFromAdmin" class="home-btn" title="Volver al inicio">
          <svg viewBox="0 0 24 24">
            <path d="M3 10L12 3L21 10V21H14V14H10V21H3Z" />
          </svg>
        </button>

      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editorScreen" class="screen hidden">
    <div class="main-layout">

      <aside class="sidebar">

        <header class="editor-header">

          <button class="nav-btn" onclick="location.reload()" data-tooltip="Inicio">
            <svg viewBox="0 0 24 24">
              <path d="M3 10L12 3L21 10V21H14V14H10V21H3Z" />
            </svg>
          </button>

          <div class="selector-tema" data-tooltip="Seleccionar tema">
            <svg viewBox="0 0 24 24">
              <path d="M3 7H9L11 9H21V19H3Z" />
            </svg>
            <span>Seleccionar Tema</span>
            <svg class="arrow" viewBox="0 0 24 24">
              <path d="M6 9L12 15L18 9" />
            </svg>
          </div>

          <div class="progreso">0 / 0</div>

          <div class="top-actions">
            <button id="runCodeBtn" data-tooltip="Ejecutar código">
              <svg viewBox="0 0 24 24">
                <polygon points="5,3 19,12 5,21 5,3" />
              </svg>
            </button>

            <button data-tooltip="Vista móvil">
              <svg viewBox="0 0 24 24">
                <rect x="7" y="2" width="10" height="20" rx="2" />
                <line x1="11" y1="18" x2="13" y2="18" />
              </svg>
            </button>

            <button data-tooltip="Guardar código">
              <svg viewBox="0 0 24 24">
                <path d="M5 3H19L21 5V21H3V3Z" />
                <path d="M7 3V9H17V3" />
              </svg>
            </button>
          </div>

        </header>

        <div class="instrucciones">
          <div class="code-icon">&lt; &gt;</div>
          <p>Selecciona un tema o actividad para comenzar</p>
        </div>

        <nav class="tab-container">
          <button class="tab active" data-lang="html">HTML</button>
          <button class="tab" data-lang="css">CSS</button>
          <button class="tab" data-lang="js">JS</button>
        </nav>

        <div class="editor-body">
          <textarea id="htmlCode" class="code-input"></textarea>
          <textarea id="cssCode" class="code-input hidden"></textarea>
          <textarea id="jsCode" class="code-input hidden"></textarea>
        </div>

      </aside>

      <main class="preview-panel">
        <iframe id="preview"></iframe>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
